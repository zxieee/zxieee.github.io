  <!-- ============================================================
       GATE OVERLAY: loading state + password protection
       To change the password, edit the PASSWORD constant below.
       Note: client-side gating only — not real security.
       ============================================================ -->
  <div id="gate" aria-live="polite" data-state="loading">
    <!-- Tree-shadow canopy — mirrors the portfolio's TREE_CONFIG in app.jsx:
         version: 'canopy', tint: 'peach', opacity: 0.15, sway: 18, blur: 3,
         leafSize: 85. Layer sizes are 'canopy' defaults pre-scaled ×0.85. -->
    <div class="tree-shadow gate-tree" aria-hidden="true" style="--tree-opacity: 0.15; --tree-sway: 18s; --tree-blur: 3px;">
      <div class="ts-leaf-layer ts-leaf-back" style="background-image: url('assets/leaf-peach-1.png'); background-size: 97.8% auto; background-position: right -10%; background-repeat: no-repeat; opacity: 0.55; filter: blur(3px);"></div>
      <div class="ts-leaf-layer ts-leaf-front" style="background-image: url('assets/leaf-peach-1.png'); background-size: 91.8% auto; background-position: 90% -18%; background-repeat: no-repeat; opacity: 0.95;"></div>
    </div>

    <!-- Shared stage: the wordmark logo sits above a stack of swappable views
         (loading / password). Because the logo is one DOM node across all
         states, it doesn't re-mount when state changes — it simply stops
         spinning, or flies to the corner on unlock. -->
    <div class="gate-stage">
      <a class="gate-wordmark" href="#top" aria-label="Angela Xie">
        <span class="gate-wordmark-spin"><span class="gate-wordmark-mark" aria-hidden="true"></span></span>
      </a>

      <div class="gate-views">
        <!-- Loading view: just the caption (the wordmark above is the loader). -->
        <div class="gate-view gate-loading is-active" data-view="loading" data-loader="mark">
          <!-- Alt loaders — hidden when data-loader="mark" (default); the
               wordmark itself is the spinner in that case. Tweaks can swap
               these in for debug previews. -->
          <div class="loader loader-dots">
            <span class="gate-dot"></span>
            <span class="gate-dot"></span>
            <span class="gate-dot"></span>
          </div>
          <div class="loader loader-orbit" aria-hidden="true">
            <span class="orbit-ring"></span>
            <span class="orbit-dot orbit-dot-1"></span>
            <span class="orbit-dot orbit-dot-2"></span>
            <span class="orbit-dot orbit-dot-3"></span>
            <span class="orbit-core"></span>
          </div>
          <div class="loader loader-bars" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
          <div class="loader loader-trace" aria-hidden="true">
            <svg viewBox="0 0 64 64" width="64" height="64" fill="none" stroke-linecap="round">
              <circle cx="32" cy="32" r="24" stroke="rgba(31,26,36,0.08)" stroke-width="3"></circle>
              <circle class="trace-arc" cx="32" cy="32" r="24" stroke="#1F1A24" stroke-width="3"></circle>
            </svg>
          </div>
          <p class="gate-mono">loading goodness…</p>
        </div>

        <!-- Password view: form + hint. -->
        <div class="gate-view gate-auth" data-view="auth">
          <form id="gate-form" autocomplete="off">
            <div class="gate-field" data-button="default" data-shadow="diffuse">
              <input
                id="gate-input"
                type="password"
                name="passphrase"
                placeholder="What’s the magic word?"
                autocomplete="off"
                autocapitalize="off"
                spellcheck="false"
                required
              >
              <button type="submit" id="gate-submit" aria-label="Unlock">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 9h11M10 4.5L14.5 9 10 13.5"></path></svg>
              </button>
            </div>
            <p class="gate-error" id="gate-error" aria-live="assertive"></p>
          </form>
          <p class="gate-hint">Or <a href="/cdn-cgi/l/email-protection#b0c8cadd81808088f0d7ddd1d9dc9ed3dfdd8fc3c5d2dad5d3c48dfdd1d7d9d3958280c7dfc2d4958280d6dfc2958280c9dfc5c2958280c0dfc2c4d6dfdcd9df96d2dfd4c98df8d9958280f1ded7d5dcd19582f39580f19580f1f3dfc5dcd4958280f9958280d7d5c4958280c4d8d5958280ddd1d7d9d3958280c7dfc2d4958280c4df958280c3d5d5958280c9dfc5c2958280c0dfc2c4d6dfdcd9df9583f69580f19580f1e4d8d1dedbc3958281" class="gate-link">talk</a> to Angela.</p>
        </div>
      </div>

  <style>
    /* Gate overlay matches site palette (var fallbacks for first paint, before main.css) */
    #gate {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #FBF8F5;
      color: #1F1A24;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    #gate.is-hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    #gate[hidden] { display: none !important; }

    /* Tree-shadow override: gate fills the viewport, so cap the canopy
       container to 100% (vs the 130vh used on the landing page). The mask
       gradient in main.css fades content top → bottom; on a 100% container
       the fade-out lands around 72% which is below the centered wordmark. */
    #gate .gate-tree {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 100%;
    }

    /* Shared stage — wordmark above, stacked views below. */
    .gate-stage {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: min(420px, 88vw);
    }
    .gate-views {
      position: relative;
      width: 100%;
      /* Reserve space for the tallest view (auth: form + hint ≈ 110px). */
      min-height: 110px;
    }
    /* In loading state, no form is reserved — collapse min-height so the
       wordmark + caption sit at true visual center of the viewport. */
    #gate[data-state="loading"] .gate-views {
      min-height: 0;
    }
    .gate-view {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transform: translateY(4px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .gate-view.is-active {
      opacity: 1;
      pointer-events: auto;
      transform: none;
    }

    .gate-mono {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #8B8290;
    }

    /* Wordmark — logo mark only (text removed). Wrapped in .gate-wordmark-spin
       so the same markSpin animation can apply during loading state AND during
       the password→unlock transition. The wordmark is a shared element across
       all gate views (loading / password) so it never re-mounts — it just
       stops spinning, then later flies to the corner to morph into the hero
       logo. */
    .gate-wordmark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
      text-decoration: none;
      /* Scale + translate around the mark's center when it flies to the
         portfolio's hero-logo corner during unlock. */
      transform-origin: 50% 50%;
      will-change: transform;
    }
    .gate-wordmark-spin {
      display: inline-block;
      width: 56px; height: 56px;
    }
    .gate-wordmark-mark {
      display: block;
      width: 100%; height: 100%;
      background-image: url('logo.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      filter: drop-shadow(0 4px 16px rgba(184, 92, 142, 0.18));
    }

    /* Password → unlock seamless transition: form/hint fade away, the logo
       mark already on screen begins spinning in place, then the gate fades.
       The wordmark now lives in .gate-stage (not inside .gate-auth), so the
       triggers go on #gate.is-unlocking instead. */
    #gate-form, .gate-hint {
      transition: opacity 0.45s ease, transform 0.45s ease;
    }
    #gate.is-unlocking #gate-form,
    #gate.is-unlocking .gate-hint {
      opacity: 0;
      transform: translateY(-4px);
      pointer-events: none;
    }
    /* Wordmark spins (a) during the loading state, (b) during the unlock
       transition. CSS keyframes from the markSpin definition below. */
    #gate[data-state="loading"] .gate-wordmark-spin,
    #gate.is-unlocking .gate-wordmark-spin {
      animation: markSpin 2.4s cubic-bezier(0.65, 0, 0.35, 1) infinite;
    }

    .gate-field {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 5px 5px 18px;
      background: #FFFFFF;
      border: 1px solid transparent;
      border-radius: 999px;
      transition: box-shadow 0.25s ease, border-color 0.25s ease, transform 0.2s ease;
    }
    /* ===== Field shadow variants (Tweakable via data-shadow on .gate-field) =====
       The current default is "soft" — gentle multi-layer ambient. Other variants
       trade off color, contrast, and falloff. */
    .gate-field[data-shadow="soft"] {
      box-shadow:
        0 1px 2px rgba(31, 26, 36, 0.03),
        0 4px 16px rgba(31, 26, 36, 0.05);
    }
    .gate-field[data-shadow="soft"]:focus-within {
      box-shadow:
        0 1px 2px rgba(31, 26, 36, 0.05),
        0 6px 22px rgba(31, 26, 36, 0.07),
        0 0 0 4px rgba(184, 164, 232, 0.14);
    }
    /* Diffuse — large soft halo, low opacity, dreamy floating look. */
    .gate-field[data-shadow="diffuse"] {
      box-shadow: 0 12px 48px rgba(31, 26, 36, 0.07);
    }
    .gate-field[data-shadow="diffuse"]:focus-within {
      box-shadow:
        0 16px 56px rgba(184, 164, 232, 0.22),
        0 0 0 4px rgba(184, 164, 232, 0.14);
    }
    /* Warm — peach/pink tinted shadow, brand-aligned. */
    .gate-field[data-shadow="warm"] {
      box-shadow:
        0 2px 8px rgba(255, 176, 136, 0.18),
        0 10px 28px rgba(255, 142, 168, 0.14);
    }
    .gate-field[data-shadow="warm"]:focus-within {
      box-shadow:
        0 4px 14px rgba(255, 176, 136, 0.28),
        0 14px 36px rgba(255, 142, 168, 0.22),
        0 0 0 4px rgba(255, 194, 212, 0.30);
    }
    /* Cool — lilac/purple tinted shadow. */
    .gate-field[data-shadow="cool"] {
      box-shadow:
        0 2px 8px rgba(184, 164, 232, 0.20),
        0 10px 28px rgba(184, 164, 232, 0.16);
    }
    .gate-field[data-shadow="cool"]:focus-within {
      box-shadow:
        0 4px 14px rgba(184, 164, 232, 0.30),
        0 14px 36px rgba(184, 164, 232, 0.24),
        0 0 0 4px rgba(184, 164, 232, 0.30);
    }
    /* Outlined — no shadow, thin neutral border (the original look). */
    .gate-field[data-shadow="outlined"] {
      background: rgba(255,255,255,0.72);
      border-color: rgba(31, 26, 36, 0.12);
      box-shadow: none;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .gate-field[data-shadow="outlined"]:focus-within {
      border-color: rgba(31, 26, 36, 0.22);
      box-shadow: 0 0 0 4px rgba(184, 164, 232, 0.18);
    }
    /* Colored gradient outline — brand peach→pink→purple ring on white.
       Built with a double-background trick so the gradient lives on the
       border-box while the inner stays a flat white padding-box. */
    .gate-field[data-shadow="colored"] {
      background:
        linear-gradient(#FFFFFF, #FFFFFF) padding-box,
        linear-gradient(135deg, #FFB088 0%, #FFC2D4 45%, #B8A4E8 100%) border-box;
      border: 1px solid transparent;
      box-shadow: none;
    }
    .gate-field[data-shadow="colored"]:focus-within {
      background:
        linear-gradient(#FFFFFF, #FFFFFF) padding-box,
        linear-gradient(135deg, #FF9D6F 0%, #FFA8C2 45%, #A48ADD 100%) border-box;
      box-shadow:
        0 4px 18px rgba(184, 164, 232, 0.18),
        0 0 0 4px rgba(184, 164, 232, 0.20);
    }
    #gate-input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font: inherit;
      font-size: 15px;
      color: #1F1A24;
      padding: 8px 0;
      letter-spacing: 0.04em;
    }
    #gate-input::placeholder {
      /* Matches .gate-mono — the same mono uppercase voice as "loading goodness…" */
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #8B8290;
    }
    #gate-submit {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: #1F1A24;
      color: #FBF8F5;
      display: inline-flex; align-items: center; justify-content: center;
      gap: 6px;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
      border: 1.5px solid transparent;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    #gate-submit:hover { transform: translateX(2px); background: #2d2632; }
    #gate-submit:active { transform: translateX(1px) scale(0.97); }

    /* ===== Submit button variants (Tweakable) =====
       Switched by data-button on .gate-field. The text label slips in via
       ::before for the "pill" variant; other variants are pure restyles
       of the default circular button. */
    .gate-field[data-button="pill"] #gate-submit {
      width: auto;
      height: 38px;
      border-radius: 999px;
      padding: 0 14px 0 16px;
    }
    .gate-field[data-button="pill"] #gate-submit::before {
      content: "Enter";
    }
    .gate-field[data-button="gradient"] #gate-submit {
      background: linear-gradient(135deg, #FFB088 0%, #FFC2D4 45%, #B8A4E8 100%);
      color: #FFFFFF;
      box-shadow: 0 2px 10px rgba(184, 92, 142, 0.25);
    }
    .gate-field[data-button="gradient"] #gate-submit:hover {
      background: linear-gradient(135deg, #FF9D6F 0%, #FFA8C2 45%, #A48ADD 100%);
      box-shadow: 0 4px 14px rgba(184, 92, 142, 0.32);
    }
    .gate-field[data-button="outline"] #gate-submit {
      background: transparent;
      color: #1F1A24;
      border-color: #1F1A24;
    }
    .gate-field[data-button="outline"] #gate-submit:hover {
      background: #1F1A24;
      color: #FBF8F5;
    }

    .gate-error {
      min-height: 18px;
      margin-top: 12px;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #C2547A;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .gate-error.is-shown { opacity: 1; }

    .gate-foot {
      margin-top: 28px;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #8B8290;
    }

    /* Casual hint with mailto link */
    .gate-hint {
      margin-top: 22px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: #5A5260;
      line-height: 1.5;
    }
    .gate-link {
      color: #1F1A24;
      font-weight: 600;
      border-bottom: 1px solid rgba(31, 26, 36, 0.25);
      padding-bottom: 1px;
      transition: border-color 0.2s ease, color 0.2s ease;
    }
    .gate-link:hover {
      color: #B85C8E;
      border-bottom-color: #B85C8E;
    }

    /* Shake on wrong password */
    .gate-field.is-wrong {
      animation: gateShake 0.4s ease;
      box-shadow:
        0 1px 2px rgba(194, 84, 122, 0.10),
        0 4px 14px rgba(194, 84, 122, 0.18),
        0 12px 28px rgba(194, 84, 122, 0.12),
        0 0 0 4px rgba(194, 84, 122, 0.16);
    }
    @keyframes gateShake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }

    /* ===== Loaders (alt visuals shown in loading view; the shared wordmark
       above is the spinner when data-loader="mark", which is the default) ===== */
    .loader { display: none; margin-bottom: 14px; }
    .gate-loading[data-loader="dots"]  .loader-dots,
    .gate-loading[data-loader="orbit"] .loader-orbit,
    .gate-loading[data-loader="bars"]  .loader-bars { display: inline-flex; }
    .gate-loading[data-loader="trace"] .loader-trace { display: inline-block; }

    /* Dots (default) */
    .loader-dots { gap: 10px; }
    .gate-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #1F1A24;
      animation: gatePulse 1.2s ease-in-out infinite;
    }
    .gate-dot:nth-child(1) { background: #FFB088; animation-delay: 0s; }
    .gate-dot:nth-child(2) { background: #B8A4E8; animation-delay: 0.18s; }
    .gate-dot:nth-child(3) { background: #FFC2D4; animation-delay: 0.36s; }
    @keyframes gatePulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%           { transform: scale(1);   opacity: 1;   }
    }

    /* Orbit — three palette dots orbiting a soft dashed halo */
    .loader-orbit {
      position: relative;
      width: 56px; height: 56px;
    }
    .orbit-ring {
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 1.5px dashed rgba(31, 26, 36, 0.18);
      animation: orbitSpin 6s linear infinite;
    }
    .orbit-core {
      position: absolute;
      left: 50%; top: 50%;
      width: 8px; height: 8px;
      margin: -4px 0 0 -4px;
      border-radius: 50%;
      background: #1F1A24;
    }
    .orbit-dot {
      position: absolute;
      left: 50%; top: 50%;
      width: 56px; height: 56px;
      margin: -28px 0 0 -28px;
      animation: orbitSpin 1.8s linear infinite;
    }
    .orbit-dot::before {
      content: "";
      position: absolute;
      top: -3px; left: 50%;
      transform: translateX(-50%);
      width: 10px; height: 10px;
      border-radius: 50%;
    }
    /* Three dots, 120° apart — pink, orange, purple */
    .orbit-dot-1 { animation-delay: 0s; }
    .orbit-dot-1::before { background: #FFB088; box-shadow: 0 0 0 4px rgba(255, 176, 136, 0.22); }
    .orbit-dot-2 { animation-delay: -0.6s; }
    .orbit-dot-2::before { background: #FFC2D4; box-shadow: 0 0 0 4px rgba(255, 194, 212, 0.22); }
    .orbit-dot-3 { animation-delay: -1.2s; }
    .orbit-dot-3::before { background: #B8A4E8; box-shadow: 0 0 0 4px rgba(184, 164, 232, 0.22); }
    @keyframes orbitSpin { to { transform: rotate(360deg); } }

    /* Bars — wave of vertical bars */
    .loader-bars {
      gap: 6px;
      align-items: flex-end;
      height: 36px;
    }
    .loader-bars > span {
      display: block;
      width: 5px;
      height: 100%;
      border-radius: 3px;
      background: #1F1A24;
      transform-origin: bottom;
      animation: barsWave 1.1s ease-in-out infinite;
    }
    .loader-bars > span:nth-child(1) { background: #FFB088; animation-delay: 0.00s; }
    .loader-bars > span:nth-child(2) { background: #FFC2D4; animation-delay: 0.10s; }
    .loader-bars > span:nth-child(3) { background: #B8A4E8; animation-delay: 0.20s; }
    .loader-bars > span:nth-child(4) { background: #D8C4F5; animation-delay: 0.30s; }
    .loader-bars > span:nth-child(5) { background: #FFB088; animation-delay: 0.40s; }
    @keyframes barsWave {
      0%, 100% { transform: scaleY(0.3); opacity: 0.5; }
      50%      { transform: scaleY(1);   opacity: 1;   }
    }

    /* Trace — SVG arc that draws itself */
    .loader-trace svg { display: block; transform: rotate(-90deg); }
    .trace-arc {
      stroke-dasharray: 150.8; /* 2πr where r=24 */
      stroke-dashoffset: 150.8;
      animation: traceDraw 1.8s ease-in-out infinite;
      transform-origin: center;
    }
    @keyframes traceDraw {
      0%   { stroke-dashoffset: 150.8; transform: rotate(0deg); }
      50%  { stroke-dashoffset: 30;    transform: rotate(180deg); }
      100% { stroke-dashoffset: 150.8; transform: rotate(720deg); }
    }

    /* markSpin / markBreathe — keyframes used by the shared .gate-wordmark-spin
       (see #gate[data-state="loading"] rule above). The breathe is currently
       unused but kept for future use. */
    @keyframes markSpin { to { transform: rotate(360deg); } }
    @keyframes markBreathe {
      0%, 100% { transform: scale(0.82); }
      50%      { transform: scale(1);    }
    }

    @media (prefers-reduced-motion: reduce) {
      .gate-dot,
      .orbit-ring, .orbit-dot,
      .loader-bars > span,
      .trace-arc,
      .gate-wordmark-spin { animation: none !important; }
      .gate-view { animation: none !important; transition: opacity 0.2s ease !important; }
    }
  </style>

  <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
    (function () {

      // Controls what appears before the site loads:
      //   'off'      — skip everything, site loads instantly (public)
      //   'loading'  — show loading animation, then auto-enter site
      //   'password' — show loading → require password → enter site
      var GATE_MODE = "loading";
      var PASSWORD = "potato"; // only used when GATE_MODE === 'password'
      // =============================================================

      var SESSION_KEY = "gate.unlocked.v1";
      var gate = document.getElementById("gate");

      // Mode: 'off' — hide gate immediately, skip the rest.
      if (GATE_MODE === "off") {
        gate.setAttribute("hidden", "");
        gate.classList.add("is-hidden");
        document.body.style.overflow = "";
        return;
      }

      var viewLoading = gate.querySelector('[data-view="loading"]');
      var viewAuth = gate.querySelector('[data-view="auth"]');
      var form = document.getElementById("gate-form");
      var input = document.getElementById("gate-input");
      var field = form.querySelector(".gate-field");
      var errEl = document.getElementById("gate-error");

      // ---- Imperative state controller (also driven by Tweaks panel) ----
      // States: 'loading' | 'password' | 'unlocked'
      //
      // Architecture: the gate has a single shared wordmark logo above a
      // stack of swappable views (.gate-views > .gate-view). State changes
      // toggle .is-active on the views (opacity fade) and set data-state
      // on #gate, which gates the wordmark spin via CSS. The wordmark never
      // re-mounts — it just stops spinning, then flies to the corner on unlock.
      function resetWordmark() {
        // Clear inline transform/transition/animation from a previous
        // fly-to-corner or spin-decel so the wordmark sits in its normal
        // center spot, ready to spin via CSS if data-state="loading".
        var wm = gate.querySelector(".gate-wordmark");
        if (wm) {
          wm.style.transition = "";
          wm.style.transform = "";
        }
        var spin = gate.querySelector(".gate-wordmark-spin");
        if (spin) {
          spin.style.transition = "";
          spin.style.transform = "";
          spin.style.animation = "";
        }
      }

      function decelSpin(duration) {
        // Smoothly decelerate the CSS spin to rotation 0 (or next 360°),
        // avoiding the abrupt snap-back that would happen if we just
        // dropped the animation.
        duration = duration || 400;
        var spin = gate.querySelector(".gate-wordmark-spin");
        if (!spin) return;
        var st = getComputedStyle(spin).transform;
        var rot = 0;
        if (st && st !== "none" && st.indexOf("matrix") === 0) {
          var v = st.replace(/matrix\(|\)/g, "").split(",");
          var a = parseFloat(v[0]);
          var b = parseFloat(v[1]);
          rot = Math.atan2(b, a) * (180 / Math.PI);
        }
        spin.style.animation = "none";
        void spin.offsetWidth;
        spin.style.transform = "rotate(" + rot + "deg)";
        void spin.offsetWidth;
        spin.style.transition = "transform " + duration + "ms cubic-bezier(0.2, 0.7, 0.2, 1)";
        spin.style.transform = "rotate(" + (rot <= 0 ? 0 : 360) + "deg)";
      }

      function setGateState(state, opts) {
        opts = opts || {};
        if (state === "unlocked") {
          if (opts.persist !== false) {
            try { sessionStorage.setItem(SESSION_KEY, "1"); } catch (e) {}
          }
          gate.setAttribute("data-state", "unlocked");
          gate.classList.add("is-hidden");
          setTimeout(function () { gate.setAttribute("hidden", ""); }, 600);
          document.body.style.overflow = "";
          return;
        }
        var prevState = gate.getAttribute("data-state");

        // Show gate again if it was hidden.
        gate.removeAttribute("hidden");
        gate.classList.remove("is-hidden");
        document.body.style.overflow = "hidden";

        if (state === "loading") {
          // Re-entering loading: clear any leftover unlock styles, then let
          // CSS pick up the spin via data-state="loading".
          resetWordmark();
          gate.classList.remove("is-unlocking");
          gate.setAttribute("data-state", "loading");
          viewLoading.classList.add("is-active");
          viewAuth.classList.remove("is-active");
        } else if (state === "password") {
          gate.classList.remove("is-unlocking");
          if (prevState === "loading") {
            // Smooth spin-down before stopping the CSS animation.
            decelSpin(400);
          } else {
            // Fly-to-corner or stale inline styles may be present; clean them.
            resetWordmark();
          }
          gate.setAttribute("data-state", "password");
          viewLoading.classList.remove("is-active");
          viewAuth.classList.add("is-active");
          if (opts.focus !== false) {
            setTimeout(function () { input.focus(); }, 450);
          }
        }
      }

      window.__gate = {
        setState: setGateState,
        clearSession: function () {
          try { sessionStorage.removeItem(SESSION_KEY); } catch (e) {}
        },
        isUnlocked: function () {
          try { return sessionStorage.getItem(SESSION_KEY) === "1"; } catch (e) { return false; }
        }
      };

      // ---- Default boot flow ----
      // If already unlocked this session, hide gate immediately.
      try {
        if (sessionStorage.getItem(SESSION_KEY) === "1") {
          gate.setAttribute("hidden", "");
          return;
        }
      } catch (e) {}

      // Lock scroll while gate is up.
      document.body.style.overflow = "hidden";

      // Wait until React + Babel scripts have finished loading, then
      // transition out of the loading state. Minimum dwell of ~900ms so
      // the loading screen feels intentional rather than a flicker.
      //
      // GATE_MODE === 'password' → after loading, show the password form.
      // GATE_MODE === 'loading'  → after loading, unlock & enter the site.
      var t0 = Date.now();
      function reveal() {
        var elapsed = Date.now() - t0;
        var wait = Math.max(0, 2000 - elapsed);
        setTimeout(function () {
          if (GATE_MODE === "password") {
            setGateState("password");
          } else {
            // 'loading' mode: trigger the same unlock animation the
            // password form would (wordmark spins → flies to corner → fade).
            unlockAndExit();
          }
        }, wait);
      }
      if (document.readyState === "complete") {
        reveal();
      } else {
        window.addEventListener("load", reveal, { once: true });
      }

      // ---- Auto-unlock path (used by 'loading' mode after dwell finishes).
      // Reuses the same fly-to-corner animation as the password submit path,
      // minus the form fade since no form was ever shown. ----
      function unlockAndExit() {
        gate.classList.add("is-unlocking");
        // Short delay before flight; the wordmark is already spinning from
        // data-state="loading", so we just need a beat before launch.
        setTimeout(flyToHeroLogo, 200);
      }

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        errEl.classList.remove("is-shown");
        if (input.value.trim().toLowerCase() === PASSWORD.toLowerCase()) {
          // Form/hint fade out, the wordmark logo begins spinning in place,
          // then it flies to the corner to morph into the portfolio's hero logo.
          input.blur();
          gate.classList.add("is-unlocking");
          setTimeout(flyToHeroLogo, 900);
        } else {
          field.classList.remove("is-wrong");
          // restart animation
          void field.offsetWidth;
          field.classList.add("is-wrong");
          errEl.textContent = "incorrect passphrase";
          errEl.classList.add("is-shown");
          input.select();
        }
      });

      input.addEventListener("input", function () {
        if (errEl.classList.contains("is-shown")) {
          errEl.classList.remove("is-shown");
          field.classList.remove("is-wrong");
        }
      });

      // ---- Fly-to-corner: shared-element-style transition that morphs
      // the centered, spinning wordmark into the portfolio's static
      // hero-logo mark at the top-left. Measures both elements at flight
      // time and uses CSS transforms so the move is GPU-smooth. ----
      function flyToHeroLogo() {
        var wordmark = gate.querySelector(".gate-wordmark");
        var spin = gate.querySelector(".gate-wordmark-spin");
        var target = document.querySelector(".hero-logo-mark");
        // Fallback path if the portfolio hasn't mounted the hero logo yet.
        if (!wordmark || !spin || !target) {
          setGateState("unlocked");
          return;
        }
        var wmRect = wordmark.getBoundingClientRect();
        var tRect = target.getBoundingClientRect();
        var dx = (tRect.left + tRect.width / 2) - (wmRect.left + wmRect.width / 2);
        var dy = (tRect.top + tRect.height / 2) - (wmRect.top + wmRect.height / 2);
        var scale = tRect.width / wmRect.width;

        // Fly the outer anchor (preserves the spin animation on the inner span).
        wordmark.style.transition = "transform 750ms cubic-bezier(0.65, 0.05, 0.35, 1)";
        wordmark.style.transform = "translate(" + dx + "px, " + dy + "px) scale(" + scale + ")";

        // ~halfway through the flight, decelerate the spin to rotation 0 so the
        // landed logo aligns with the static hero-logo's orientation. Read the
        // current matrix, lock it, then animate to the next 360° multiple.
        setTimeout(function () {
          var st = getComputedStyle(spin).transform;
          var rot = 0;
          if (st && st !== "none" && st.indexOf("matrix") === 0) {
            var v = st.replace(/matrix\(|\)/g, "").split(",");
            var a = parseFloat(v[0]);
            var b = parseFloat(v[1]);
            rot = Math.atan2(b, a) * (180 / Math.PI);
          }
          spin.style.animation = "none";
          void spin.offsetWidth;
          spin.style.transform = "rotate(" + rot + "deg)";
          void spin.offsetWidth;
          spin.style.transition = "transform 350ms cubic-bezier(0.2, 0.7, 0.2, 1)";
          spin.style.transform = "rotate(" + (rot <= 0 ? 0 : 360) + "deg)";
        }, 380);

        // Land + fade. Gate fade overlaps the last ~150ms of flight so the
        // static hero-logo reveals seamlessly beneath the morphing wordmark.
        setTimeout(function () { setGateState("unlocked"); }, 650);
      }
    })();
  </script>
